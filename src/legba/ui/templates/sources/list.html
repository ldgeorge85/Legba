{% extends "base.html" %}
{% block title %}Sources — Legba Console{% endblock %}

{% block content %}
<div class="mb-6">
  <h1 class="text-2xl font-bold text-gray-100">Source Registry</h1>
  <p class="text-sm text-gray-400 mt-1">{{ total }} registered sources</p>
</div>

<!-- Filters -->
<div class="flex flex-wrap gap-3 mb-4">
  <select name="status"
          class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-cyan-600"
          hx-get="/sources"
          hx-trigger="change"
          hx-target="#source-rows"
          hx-include="[name='source_type']"
          hx-push-url="true">
    <option value="">All statuses</option>
    {% for s in statuses %}
      <option value="{{ s }}" {% if status == s %}selected{% endif %}>{{ s }}</option>
    {% endfor %}
  </select>
  <select name="source_type"
          class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-cyan-600"
          hx-get="/sources"
          hx-trigger="change"
          hx-target="#source-rows"
          hx-include="[name='status']"
          hx-push-url="true">
    <option value="">All types</option>
    {% for t in source_types %}
      <option value="{{ t }}" {% if source_type == t %}selected{% endif %}>{{ t }}</option>
    {% endfor %}
  </select>
</div>

<!-- Table -->
<div class="card overflow-x-auto">
  <table class="w-full text-sm">
    <thead>
      <tr class="text-left text-xs text-gray-500 uppercase border-b border-gray-700">
        <th class="pb-2 pr-4">Name</th>
        <th class="pb-2 pr-4">Type</th>
        <th class="pb-2 pr-4">Status</th>
        <th class="pb-2 pr-4">Reliability</th>
        <th class="pb-2 pr-4">Bias</th>
        <th class="pb-2">Last Fetched</th>
      </tr>
    </thead>
    <tbody id="source-rows">
      {% include "sources/_rows.html" %}
    </tbody>
  </table>
</div>
{% endblock %}
