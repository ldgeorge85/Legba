{% extends "base.html" %}
{% block title %}Entities — Legba Console{% endblock %}

{% block content %}
<div class="mb-6">
  <h1 class="text-2xl font-bold text-gray-100">Entity Explorer</h1>
  <p class="text-sm text-gray-400 mt-1">{{ total }} entity profiles in the world model</p>
</div>

<!-- Filters -->
<div class="flex gap-3 mb-4">
  <input type="text"
         name="q"
         value="{{ q or '' }}"
         placeholder="Search entities..."
         class="flex-1 max-w-md bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-cyan-600"
         hx-get="/entities"
         hx-trigger="keyup changed delay:300ms"
         hx-target="#entity-rows"
         hx-include="[name='entity_type']"
         hx-push-url="true">
  <select name="entity_type"
          class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-cyan-600"
          hx-get="/entities"
          hx-trigger="change"
          hx-target="#entity-rows"
          hx-include="[name='q']"
          hx-push-url="true">
    <option value="">All types</option>
    {% for t in entity_types %}
      <option value="{{ t }}" {% if entity_type == t %}selected{% endif %}>{{ t }}</option>
    {% endfor %}
  </select>
</div>

<!-- Table -->
<div class="card overflow-x-auto">
  <table class="w-full text-sm">
    <thead>
      <tr class="text-left text-xs text-gray-500 uppercase border-b border-gray-700">
        <th class="pb-2 pr-4">Name</th>
        <th class="pb-2 pr-4">Type</th>
        <th class="pb-2 pr-4">Completeness</th>
        <th class="pb-2 pr-4">Events</th>
        <th class="pb-2 pr-4">Updated</th>
      </tr>
    </thead>
    <tbody id="entity-rows">
      {% include "entities/_rows.html" %}
    </tbody>
  </table>
</div>
{% endblock %}
