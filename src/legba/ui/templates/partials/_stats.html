<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
  <div class="card text-center">
    <div class="text-3xl font-bold text-cyan-400">{{ cycle_number }}</div>
    <div class="text-xs text-gray-400 mt-1">Current Cycle</div>
  </div>
  <div class="card text-center">
    <div class="text-3xl font-bold text-blue-400">{{ entity_count }}</div>
    <div class="text-xs text-gray-400 mt-1">Entities</div>
  </div>
  <div class="card text-center">
    <div class="text-3xl font-bold text-green-400">{{ event_count }}</div>
    <div class="text-xs text-gray-400 mt-1">Events</div>
  </div>
  <div class="card text-center">
    <div class="text-3xl font-bold text-purple-400">{{ source_count }}</div>
    <div class="text-xs text-gray-400 mt-1">Sources</div>
  </div>
  <div class="card text-center">
    <div class="text-3xl font-bold text-yellow-400">{{ goal_count }}</div>
    <div class="text-xs text-gray-400 mt-1">Active Goals</div>
  </div>
  <div class="card text-center">
    <div class="text-3xl font-bold text-orange-400">{{ relationship_count }}</div>
    <div class="text-xs text-gray-400 mt-1">Relationships</div>
  </div>
</div>
