{% extends "base.html" %}
{% block title %}Facts — Legba Console{% endblock %}

{% block content %}
<div class="mb-6">
  <h1 class="text-2xl font-bold text-gray-100">Fact Explorer</h1>
  <p class="text-sm text-gray-400 mt-1">{{ total }} facts in the knowledge base</p>
</div>

<!-- Filters -->
<div class="flex flex-wrap gap-3 mb-4">
  <input type="text"
         name="q"
         value="{{ q or '' }}"
         placeholder="Search by subject or predicate..."
         class="flex-1 max-w-md bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-cyan-600"
         hx-get="/facts"
         hx-trigger="keyup changed delay:300ms"
         hx-target="#fact-rows"
         hx-include="[name='min_confidence']"
         hx-push-url="true">
  <select name="min_confidence"
          class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-cyan-600"
          hx-get="/facts"
          hx-trigger="change"
          hx-target="#fact-rows"
          hx-include="[name='q']"
          hx-push-url="true">
    <option value="" {% if not min_confidence %}selected{% endif %}>Any confidence</option>
    <option value="0.5" {% if min_confidence == '0.5' %}selected{% endif %}>&gt; 0.5</option>
    <option value="0.7" {% if min_confidence == '0.7' %}selected{% endif %}>&gt; 0.7</option>
    <option value="0.9" {% if min_confidence == '0.9' %}selected{% endif %}>&gt; 0.9</option>
  </select>
</div>

<!-- Table -->
<div class="card overflow-x-auto">
  <table class="w-full text-sm">
    <thead>
      <tr class="text-left text-xs text-gray-500 uppercase border-b border-gray-700">
        <th class="pb-2 pr-4">Subject</th>
        <th class="pb-2 pr-4">Predicate</th>
        <th class="pb-2 pr-4">Value</th>
        <th class="pb-2 pr-4">Confidence</th>
        <th class="pb-2 pr-4">Cycle</th>
        <th class="pb-2">Date</th>
        <th class="pb-2 pl-2 text-right">Actions</th>
      </tr>
    </thead>
    <tbody id="fact-rows">
      {% include "facts/_rows.html" %}
    </tbody>
  </table>
</div>

<script>
function startEditFact(factId, row) {
  const cells = row.querySelectorAll('td');
  const subject = cells[0].textContent.trim();
  const predicate = cells[1].textContent.trim();
  const value = cells[2].textContent.trim();
  const confBadge = cells[3].querySelector('.badge');
  const conf = confBadge ? confBadge.textContent.trim().replace('%', '') : '50';
  const confVal = (parseFloat(conf) / 100).toFixed(2);

  row.innerHTML = `
    <td colspan="7" class="py-2">
      <form hx-put="/api/facts/${factId}" hx-target="#fact-${factId}" hx-swap="outerHTML"
            class="flex flex-wrap items-center gap-2">
        <input name="subject" value="${subject}" class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-sm text-gray-200 w-40">
        <input name="predicate" value="${predicate}" class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-sm text-gray-200 w-32">
        <input name="value" value="${value}" class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-sm text-gray-200 flex-1 min-w-[120px]">
        <input name="confidence" type="number" step="0.01" min="0" max="1" value="${confVal}"
               class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-sm text-gray-200 w-20">
        <button type="submit" class="btn text-xs">Save</button>
        <button type="button" class="text-xs text-gray-500 hover:text-gray-300"
                onclick="location.reload()">Cancel</button>
      </form>
    </td>
  `;
  htmx.process(row);
}
</script>
{% endblock %}
