{% extends "base.html" %}
{% block title %}Goals — Legba Console{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-100">Goal Hierarchy</h1>
    <p class="text-sm text-gray-400 mt-1">{{ total }} goals — {{ active_count }} active, {{ completed_count }} completed</p>
  </div>
  <button class="btn text-xs" onclick="document.getElementById('add-goal-form').classList.toggle('hidden')">+ Add Goal</button>
</div>

<!-- Add Goal Form -->
<div id="add-goal-form" class="card mb-4 hidden">
  <h3 class="text-sm font-semibold text-gray-200 mb-3">New Goal</h3>
  <form action="/api/goals" method="post" class="space-y-3">
    <input name="description" placeholder="Goal description" required class="bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm text-gray-200 w-full">
    <div class="flex gap-3">
      <div class="flex items-center gap-2">
        <label class="text-xs text-gray-400">Priority:</label>
        <select name="priority" class="bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm text-gray-200">
          <option value="1">1 (highest)</option>
          <option value="2">2</option>
          <option value="3" selected>3 (default)</option>
          <option value="4">4</option>
          <option value="5">5 (lowest)</option>
        </select>
      </div>
      <input name="parent_id" placeholder="Parent goal ID (optional)" class="bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm text-gray-200 flex-1">
    </div>
    <div class="flex justify-end gap-2">
      <button type="button" class="btn text-xs" onclick="document.getElementById('add-goal-form').classList.add('hidden')">Cancel</button>
      <button type="submit" class="btn text-xs bg-cyan-900 border-cyan-700 text-cyan-300 hover:bg-cyan-800">Create</button>
    </div>
  </form>
</div>

<!-- Filters -->
<div class="flex gap-3 mb-4">
  <select name="status"
          class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-cyan-600"
          hx-get="/goals"
          hx-trigger="change"
          hx-target="#goal-tree"
          hx-push-url="true">
    <option value="">All statuses</option>
    <option value="active" {% if status_filter == 'active' %}selected{% endif %}>Active</option>
    <option value="completed" {% if status_filter == 'completed' %}selected{% endif %}>Completed</option>
  </select>
</div>

<!-- Goal tree -->
<div id="goal-tree">
  {% include "goals/_tree.html" %}
</div>
{% endblock %}
